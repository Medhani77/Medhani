<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Medhani Niwoda</title>
    <link rel="stylesheet" href="login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

<body>

    <div class="page-wrap">

        <!-- Left decorative panel -->
        <div class="panel-left">
            <div class="panel-left-inner">

                <div class="logo-wrap">
                    <div class="logo-badge">MN</div>
                    <div class="logo-text-wrap">
                        <span class="logo-main">Medhani Niwoda</span>
                        <span class="logo-sub">Curated Living</span>
                    </div>
                </div>

                <div class="panel-tagline">
                    <span class="eyebrow">Welcome back</span>
                    <p class="tagline-title">Live Beautifully.<br>Shop Mindfully.</p>
                    <p class="tagline-desc">Sign in to access your curated collection and exclusive member benefits.</p>
                </div>

            </div>
        </div>

        <!-- Right form panel -->
        <div class="panel-right">

            <div class="form-header">
                <h2 class="form-title">Sign In</h2>
                <p class="form-subtitle">New arrival? <a href="register.html" class="link">Create an account</a></p>
            </div>

            <div class="toast" id="toast"></div>

            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input class="field-input" type="email" id="email" placeholder="hello@example.com" />
            </div>

            <div class="field">
                <label class="field-label" for="password">Password</label>
                <input class="field-input" type="password" id="password" placeholder="••••••••" />
                <a href="forgot.html" class="forgot">Forgot password?</a>
            </div>

            <div class="remember-row">
                <input type="checkbox" id="remember" />
                <label for="remember">Keep me signed in</label>
            </div>

            <button class="btn-primary" onclick="handleLogin()">Sign In</button>

            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-txt">or continue with</span>
                <span class="divider-line"></span>
            </div>

            <div class="social-row">
                <button class="social-btn">
        <svg width="15" height="15" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
                <button class="social-btn">
        <svg width="15" height="15" viewBox="0 0 24 24">
          <path fill="#333" d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.6.11.793-.26.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
      </button>
            </div>

        </div>
    </div>

    <script>
        function handleLogin() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!email || !password) {
                showToast('Please fill in all fields to continue.', 'error');
                return;
            }
            if (!email.includes('@')) {
                showToast('Please enter a valid email address.', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters.', 'error');
                return;
            }

            fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        showToast(data.error, 'error');
                        return;
                    }
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showToast('Welcome back! Redirecting…', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                })
                .catch(() => {
                    showToast('Could not connect to server. Please try again.', 'error');
                });
        }

        function showToast(msg, type) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
    </script>

</body>

</html>
